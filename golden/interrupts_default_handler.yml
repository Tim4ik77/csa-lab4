name: interrupts_default_handler
source: |+
  (defconst IO_STATUS 4)
  (defconst IO_OUT 8)

  (defun putc (ch)
    (mem-set IO_OUT ch))

  (defun main ()
    (begin
      (while (= (mem-get IO_STATUS) 0) 0)
      (putc 'D')
      (putc '\n')))

config:
  mmio:
    input_data: 0
    input_status: 4
    output_data: 8
    input_overrun: 12
input: [[50, x]]
max_ticks: 10000
fail_on_max_ticks: false
