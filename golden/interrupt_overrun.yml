name: interrupt_overrun
source: |+
  (defconst IO_IN 0)
  (defconst IO_STATUS 4)
  (defconst IO_OUT 8)

  (defun main ()
    (while 1 0))

  (on-input
    (begin
      (mem-set IO_OUT (mem-get IO_IN))
      (mem-set IO_STATUS 0)))

config:
  mmio:
    input_data: 0
    input_status: 4
    output_data: 8
    input_overrun: 12
input: [[50, a], [51, b]]
max_ticks: 500
fail_on_max_ticks: false
