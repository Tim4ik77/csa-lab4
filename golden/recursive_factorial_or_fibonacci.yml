  "source": "(defconst IO_OUT 8)\n\n(defun putc (ch)\n  (mem-set IO_OUT ch))\n\n(defun print_uint_rec (x)\n  (if (< x 10)\n    (putc (+ x '0'))\n    (begin\n      (print_uint_rec (/ x 10))\n      (putc (+ (mod x 10) '0')))))\n\n(defun print_uint (x)\n  (if (= x 0)\n    (putc '0')\n    (print_uint_rec x)))\n\n(defun fib (n)\n  (if (< n 2)\n    n\n    (+ (fib (- n 1)) (fib (- n 2)))))\n\n(defun main ()\n  (begin\n    (print_uint (fib 6))\n    (putc '\\n')))\n\n",
